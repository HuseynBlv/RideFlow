services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rideflow-app
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-rideflow}
      DB_USERNAME: ${DB_USERNAME:-rideflow}
      DB_PASSWORD: ${DB_PASSWORD:-rideflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "80:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 45s

  postgres:
    image: postgis/postgis:16-3.4
    container_name: rideflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rideflow}
      POSTGRES_USER: ${DB_USERNAME:-rideflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rideflow}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-rideflow} -d ${DB_NAME:-rideflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: rideflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
