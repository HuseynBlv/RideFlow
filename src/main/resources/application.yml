spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rideflow}
    username: ${DB_USERNAME:rideflow}
    password: ${DB_PASSWORD:rideflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:0123456789012345678901234567890101234567890123456789012345678901}
    expiration: PT24H
  pricing:
    base-fare: 2.50
    booking-fee: 1.00
    minimum-fare: 5.50
    per-km-rate: 1.20
    per-minute-rate: 0.35
    estimated-average-speed-kph: 24
    route-distance-multiplier: 1.25
    minimum-estimated-duration-minutes: 5
    minimum-final-duration-minutes: 1
  dispatch:
    geo-provider: redis
    search-radius-km: 5
    max-candidate-drivers: 5
    heartbeat-ttl-seconds: 30

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.rideflow.uberclone: INFO

server:
  port: ${PORT:8080}
